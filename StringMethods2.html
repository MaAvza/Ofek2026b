<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python String Methods Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:       #004346;
  --teal-dark:  #002829;
  --teal-dim:   #1a5e61;
  --teal-mid:   #1f6e71;
  --teal-soft:  #b8d8da;
  --teal-ghost: #e0f0f1;
  --cream:      #f0ede5;
  --cream-lt:   #f8f6f1;
  --cream-md:   #d8d4ca;
  --cream-dk:   #b8b4aa;
  --white:      #ffffff;
  --tx-h:       #001415;
  --tx-b:       #162e30;
  --tx-s:       #264a4c;
  --tx-m:       #3d6668;
  --warn-bg:    #fffbf0;
  --warn-bd:    #c49800;
  --warn-tx:    #4a3400;
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
  --shadow: 0 4px 24px rgba(0,67,70,0.12);
}
@media (prefers-color-scheme: dark) {
  :root {
    --cream:      #001a1c;
    --cream-lt:   #002426;
    --cream-md:   #003032;
    --cream-dk:   #003e40;
    --white:      #002022;
    --tx-h:       #eaf4f4;
    --tx-b:       #c0dede;
    --tx-s:       #88b8ba;
    --tx-m:       #5e9294;
    --teal-ghost: #002e30;
    --teal-soft:  #003a3d;
    --teal-mid:   #3a9ea1;
    --warn-bg:    #221800;
    --warn-bd:    #9a7200;
    --warn-tx:    #f0c040;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--tx-b);min-height:100vh;line-height:1.65}

/* ── Header ── */
.hd{background:var(--teal);color:var(--cream);padding:2.5rem 2rem 2.25rem;position:relative;overflow:hidden}
.hd::after{
  content:"str";font-family:'Spectral',serif;font-size:220px;font-weight:600;
  color:rgba(240,237,229,0.05);position:absolute;right:-20px;top:-30px;
  pointer-events:none;user-select:none;line-height:1;letter-spacing:-.04em
}
.hd-inner{max-width:880px;margin:0 auto;position:relative}
.hd-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,237,229,.55);margin-bottom:10px}
.hd h1{font-family:'Spectral',serif;font-size:34px;font-weight:500;letter-spacing:-.025em;color:var(--cream);margin-bottom:5px}
.hd-sub{font-size:14px;color:rgba(240,237,229,.65);font-weight:300;max-width:520px}
.hd-stats{display:flex;gap:28px;margin-top:22px;padding-top:20px;border-top:1px solid rgba(240,237,229,.15)}
.stat-n{font-family:'Spectral',serif;font-size:24px;font-weight:500;color:var(--cream)}
.stat-l{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(240,237,229,.5);margin-top:1px}

/* ── Layout ── */
.main{max-width:880px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* ── Filter pills ── */
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.5rem}
.pill{
  font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 14px;
  border-radius:99px;border:1.5px solid var(--cream-md);
  background:var(--white);color:var(--tx-s);cursor:pointer;
  transition:all .15s;user-select:none
}
.pill:hover{border-color:var(--teal);color:var(--teal)}
.pill.active{background:var(--teal);color:var(--cream);border-color:var(--teal)}

/* ── Results bar ── */
.results-bar{display:flex;align-items:center;margin-bottom:.85rem}
.results-count{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--tx-m)}

/* ── Section labels ── */
.sec-label{
  display:flex;align-items:center;gap:8px;
  font-family:'Spectral',serif;font-size:13px;font-style:italic;color:var(--tx-s);
  margin:1.75rem 0 .75rem;padding-bottom:7px;
  border-bottom:1px solid var(--cream-md)
}
.sec-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0}

/* ── Cards ── */
.card{
  background:var(--white);border:1.5px solid var(--cream-md);
  border-radius:var(--r-lg);margin-bottom:9px;overflow:hidden;
  transition:border-color .15s,box-shadow .15s
}
.card:hover{border-color:var(--teal-dim)}
.card.open{border-color:var(--teal);box-shadow:var(--shadow)}

.card-head{
  padding:13px 18px;cursor:pointer;
  display:flex;align-items:center;gap:9px;flex-wrap:wrap
}
.method-name{
  font-family:'JetBrains Mono',monospace;font-size:13.5px;
  font-weight:500;color:var(--teal)
}
.badge{font-size:10px;padding:2px 9px;border-radius:99px;font-family:'JetBrains Mono',monospace;letter-spacing:.02em;white-space:nowrap}
.b-complex{background:var(--teal);color:var(--cream)}
.b-cat{background:var(--cream);color:var(--tx-s);border:1px solid var(--cream-md);font-weight:500}
.ret-badge{
  margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--tx-s);background:var(--cream-lt);
  padding:2px 10px;border-radius:99px;border:1px solid var(--cream-md);white-space:nowrap
}
.card-sig{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;
  color:var(--tx-s);padding:0 18px 11px;margin-top:-3px;display:none;
  background:var(--teal-ghost);padding:8px 18px 10px;border-top:1px solid var(--cream-md)
}
.card.open .card-sig{display:block}

.card-body{
  display:none;padding:0 18px 18px;
  border-top:1px solid var(--cream-md)
}
.card.open .card-body{display:block}

.desc{
  font-size:13.5px;color:var(--tx-b);
  line-height:1.8;padding:14px 0 12px
}

/* ── Examples ── */
.examples{display:flex;flex-direction:column;gap:8px}
.ex{
  background:var(--cream-lt);border:1px solid var(--cream-md);
  border-radius:var(--r-md);padding:10px 14px
}
.ex-label{
  font-size:10px;font-family:'JetBrains Mono',monospace;
  color:var(--tx-m);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;
  font-weight:500
}
.ex-code{
  font-family:'JetBrains Mono',monospace;font-size:12.5px;
  color:var(--tx-b);white-space:pre-wrap;line-height:1.7
}
.ex-out{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--teal-mid);margin-top:7px;padding-top:7px;
  border-top:1px dashed var(--cream-dk);font-weight:500
}

/* ── Gotcha ── */
.gotcha{
  margin-top:10px;background:var(--warn-bg);
  border:1px solid rgba(196,152,0,.35);border-left:3px solid var(--warn-bd);
  border-radius:var(--r-md);padding:10px 14px;
  font-size:12.5px;color:var(--warn-tx);line-height:1.7
}

/* ── Notes (similarity) ── */
.notes{
  margin-top:10px;background:var(--teal-ghost);
  border:1px solid var(--teal-soft);border-left:3px solid var(--teal-dim);
  border-radius:var(--r-md);padding:10px 14px;
  font-size:12.5px;color:var(--tx-b);line-height:1.7
}
.notes strong{color:var(--teal-dim)}

/* ── Variations ── */
.variations{margin-top:11px;background:var(--teal-ghost);border-radius:var(--r-md);padding:12px 14px;border:1px solid var(--teal-soft)}
.var-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  text-transform:uppercase;letter-spacing:.09em;color:var(--tx-m);margin-bottom:8px;font-weight:500
}
.var-row{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;
  color:var(--tx-s);margin-bottom:5px;display:flex;gap:10px;flex-wrap:wrap
}
.var-row span{color:var(--teal-mid)}

/* ── Signature box ── */
.sig-box{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;
  color:var(--tx-s);background:var(--teal-ghost);
  border:1px solid var(--teal-soft);border-radius:var(--r-md);
  padding:10px 14px;margin-bottom:0;line-height:1.7
}
.sig-args{margin-top:6px;padding-top:6px;border-top:1px dashed var(--teal-soft)}
.sig-args dt{color:var(--teal-dim);font-weight:500;display:inline}
.sig-args dd{display:inline;color:var(--tx-s);margin-left:4px}
.sig-args dt::after{content:" —"}

/* ── Empty ── */
.empty{text-align:center;padding:3.5rem 1rem;color:var(--tx-m);font-size:14px}

/* ── Footer ── */
.footer{
  text-align:center;font-size:11px;color:var(--tx-m);
  font-family:'JetBrains Mono',monospace;padding:1.25rem;
  border-top:1px solid var(--cream-md);letter-spacing:.04em
}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-inner">
    <div class="hd-tag">Python 3.6+ · String Methods Reference</div>
    <h1>String Methods</h1>
    <div class="hd-sub">Complete reference for built-in string methods — signatures, arguments, and examples.</div>
    <div class="hd-stats">
      <div><div class="stat-n" id="total-count">36</div><div class="stat-l">Methods</div></div>
      <div><div class="stat-n">7</div><div class="stat-l">Categories</div></div>
      <div><div class="stat-n">★</div><div class="stat-l">Complex flagged</div></div>
    </div>
  </div>
</header>

<main class="main">
  <div class="filter-bar" id="filters">
    <button class="pill active" onclick="setFilter('all',this)">All</button>
    <button class="pill" onclick="setFilter('complex',this)">★ Complex</button>
    <button class="pill" onclick="setFilter('case',this)">Case</button>
    <button class="pill" onclick="setFilter('search',this)">Search</button>
    <button class="pill" onclick="setFilter('split',this)">Split / Join</button>
    <button class="pill" onclick="setFilter('fmt',this)">Format</button>
    <button class="pill" onclick="setFilter('check',this)">Check / Validate</button>
    <button class="pill" onclick="setFilter('clean',this)">Clean</button>
    <button class="pill" onclick="setFilter('encode',this)">Encode</button>
  </div>

  <div class="results-bar">
    <span class="results-count" id="results-count"></span>
  </div>

  <div id="list"></div>
</main>

<footer class="footer">python 3.6+ · strings are immutable — all methods return new string objects</footer>

<script>
const METHODS = [
  /* ─── CASE ─────────────────────────────────────────── */
  {
    name:"upper()",
    cat:"case", sig:"str.upper()",
    args:[],
    ret:"str", complex:false,
    desc:"Returns a copy of the string with every cased character converted to uppercase. Non-letter characters (digits, punctuation) are left unchanged. Because Python strings are immutable, this always produces a new string object — the original is never modified.",
    examples:[
      {label:"basic", code:'"hello world".upper()', out:'→ "HELLO WORLD"'},
      {label:"digits unchanged", code:'"py3.11".upper()', out:'→ "PY3.11"'},
      {label:"normalization for comparison", code:'"Python".upper() == "PYTHON"   # True'}
    ],
    notes:"<strong>lower()</strong> is the exact opposite — all cased characters become lowercase. See <code>casefold()</code> for a Unicode-aware lowercase suited to international comparisons."
  },
  {
    name:"lower()",
    cat:"case", sig:"str.lower()",
    args:[],
    ret:"str", complex:false,
    desc:"Returns a copy of the string with every cased character converted to lowercase. Non-letter characters are unchanged. For ASCII text this is equivalent to casefold(), but for some Unicode characters (e.g., German ß) the results differ.",
    examples:[
      {label:"basic", code:'"HELLO WORLD".lower()', out:'→ "hello world"'},
      {label:"case-insensitive compare", code:'"Python".lower() == "python"   # True'}
    ],
    notes:"<strong>upper()</strong> does the reverse. For internationalized case-insensitive matching, prefer <code>casefold()</code> over <code>lower()</code>."
  },
  {
    name:"capitalize()",
    cat:"case", sig:"str.capitalize()",
    args:[],
    ret:"str", complex:false,
    desc:"Returns a copy where the very first character is uppercased and every other cased character is lowercased. Only the first character of the entire string is affected — not each word.",
    examples:[
      {label:"basic", code:'"python developer".capitalize()', out:'→ "Python developer"'},
      {label:"resets all other chars to lower", code:'"hELLO wORLD".capitalize()', out:'→ "Hello world"'}
    ],
    gotcha:"capitalize() lowercases ALL characters except the first. To capitalize each word, use title() instead.",
    notes:"<strong>title()</strong> capitalizes the first letter of every word. <strong>upper()</strong> / <strong>lower()</strong> convert the entire string."
  },
  {
    name:"title()",
    cat:"case", sig:"str.title()",
    args:[],
    ret:"str", complex:false,
    desc:"Returns a titlecased copy where the first character of every 'word' is uppercased. Python defines a word boundary as any non-letter character — apostrophes, hyphens, digits, and spaces all start a new word.",
    examples:[
      {label:"basic", code:'"python developer guide".title()', out:'→ "Python Developer Guide"'},
      {label:"apostrophe triggers new word", code:'"it\'s a cat".title()', out:"→ \"It'S A Cat\""}
    ],
    gotcha:"title() is naive about English contractions. 'it's' becomes 'It'S' because the apostrophe counts as a word boundary.",
    notes:"<strong>capitalize()</strong> only uppercases the very first character of the whole string. For smart titlecasing with contractions, use <code>string.capwords()</code> from the standard library."
  },
  {
    name:"swapcase()",
    cat:"case", sig:"str.swapcase()",
    args:[],
    ret:"str", complex:false,
    desc:"Returns a copy where every uppercase letter becomes lowercase and every lowercase letter becomes uppercase. Non-letter characters are unchanged.",
    examples:[
      {label:"basic", code:'"PyThOn".swapcase()', out:'→ "pYtHoN"'},
      {label:"mixed with punctuation", code:'"Hello Python!".swapcase()', out:'→ "hELLO pYTHON!"'}
    ]
  },
  {
    name:"casefold()",
    cat:"case", sig:"str.casefold()",
    args:[],
    ret:"str", complex:true,
    desc:"More aggressive Unicode-aware lowercase designed for case-insensitive comparisons. Handles edge cases that lower() misses — the German ß becomes 'ss', making it correctly equal to 'SS' after casefolding. Always prefer casefold() over lower() when comparing strings from international sources.",
    examples:[
      {label:"German ß", code:'"Straße".casefold()', out:'→ "strasse"'},
      {label:"correct international compare", code:'"Straße".casefold() == "STRASSE".casefold()', out:'→ True'},
      {label:"lower() misses this case", code:'"Straße".lower()', out:'→ "straße"   ← NOT equal to "strasse"'}
    ],
    gotcha:"Use casefold() instead of lower() for any case-insensitive comparison involving non-ASCII text.",
    notes:"<strong>lower()</strong> works only for ASCII. casefold() is the Unicode Standard's recommended method for caseless matching."
  },
  /* ─── SEARCH ────────────────────────────────────────── */
  {
    name:"find()",
    cat:"search", sig:"str.find(sub[, start[, end]])",
    args:[
      {name:"sub", desc:"Substring to search for."},
      {name:"start", desc:"(optional) Index to begin searching from. Defaults to 0."},
      {name:"end", desc:"(optional) Index to stop searching before. Defaults to end of string."}
    ],
    ret:"int (–1 if not found)", complex:false,
    desc:"Returns the index of the first occurrence of sub within the string (or within the slice [start:end]). Returns –1 if not found — never raises an exception. Use start/end to search within a specific portion of the string.",
    examples:[
      {label:"basic", code:'"python developer".find("o")', out:'→ 4   ← first occurrence'},
      {label:"restrict range", code:'"python developer".find("o", 5)', out:'→ 12  ← first occurrence at or after index 5'},
      {label:"not found — safe –1", code:'"hello".find("z")', out:'→ –1'}
    ],
    notes:"<strong>rfind()</strong> searches from the right (last occurrence). <strong>index()</strong> behaves identically but raises ValueError instead of returning –1, making absence an explicit error."
  },
  {
    name:"rfind()",
    cat:"search", sig:"str.rfind(sub[, start[, end]])",
    args:[
      {name:"sub", desc:"Substring to search for."},
      {name:"start", desc:"(optional) Left boundary of the slice to search."},
      {name:"end", desc:"(optional) Right boundary (exclusive) of the slice to search."}
    ],
    ret:"int (–1 if not found)", complex:false,
    desc:"Like find(), but returns the index of the last occurrence of sub. Scans right-to-left. Returns –1 if not found. Useful for extracting file extensions, domain names, or anything after the final separator.",
    examples:[
      {label:"last occurrence", code:'"abcabc".rfind("b")', out:'→ 4'},
      {label:"get filename from path", code:'"/home/user/docs/file.txt".rfind("/")', out:'→ 15'}
    ],
    notes:"<strong>find()</strong> returns the first (leftmost) occurrence instead. <strong>rindex()</strong> is identical but raises ValueError when not found."
  },
  {
    name:"index()",
    cat:"search", sig:"str.index(sub[, start[, end]])",
    args:[
      {name:"sub", desc:"Substring to search for."},
      {name:"start", desc:"(optional) Index to begin searching from."},
      {name:"end", desc:"(optional) Index to stop searching before."}
    ],
    ret:"int (raises ValueError if not found)", complex:true,
    desc:"Identical to find() but raises a ValueError when sub is not found. Use index() when the substring must exist and its absence signals a programming error — the exception provides an immediate, traceable failure.",
    examples:[
      {label:"found", code:'"hello world".index("world")', out:'→ 6'},
      {label:"not found — raises!", code:'"hello".index("z")', out:'→ ValueError: substring not found'},
      {label:"with bounds", code:'"hello".index("l", 3)', out:'→ 3   ← search starts at index 3'}
    ],
    gotcha:"Use find() when you're unsure whether the substring exists and want to handle absence yourself. Use index() when absence would be a bug.",
    notes:"<strong>find()</strong> returns –1 instead of raising. <strong>rindex()</strong> searches from the right."
  },
  {
    name:"rindex()",
    cat:"search", sig:"str.rindex(sub[, start[, end]])",
    args:[
      {name:"sub", desc:"Substring to search for."},
      {name:"start", desc:"(optional) Left boundary of the slice to search."},
      {name:"end", desc:"(optional) Right boundary (exclusive)."}
    ],
    ret:"int (raises ValueError if not found)", complex:false,
    desc:"Like index(), but returns the index of the last occurrence. Raises ValueError if not found. Mirrors the relationship between rfind() and find().",
    examples:[
      {label:"last occurrence", code:'"hello".rindex("l")', out:'→ 3'},
      {label:"not found — raises", code:'"hello".rindex("z")', out:'→ ValueError'}
    ],
    notes:"<strong>rfind()</strong> is identical but returns –1 instead of raising. <strong>index()</strong> finds the first occurrence."
  },
  {
    name:"count()",
    cat:"search", sig:"str.count(sub[, start[, end]])",
    args:[
      {name:"sub", desc:"Substring to count (can be a single character)."},
      {name:"start", desc:"(optional) Start of the search slice."},
      {name:"end", desc:"(optional) End of the search slice."}
    ],
    ret:"int", complex:false,
    desc:"Returns the number of non-overlapping occurrences of sub within the string. The 'non-overlapping' part matters — searching 'aa' in 'aaa' finds only 1 match, not 2.",
    examples:[
      {label:"character count", code:'"mississippi".count("s")', out:'→ 4'},
      {label:"within a range", code:'"python developer".count("o", 5)', out:'→ 1   ← counts from index 5 only'},
      {label:"non-overlapping gotcha", code:'"aaa".count("aa")', out:'→ 1   ← NOT 2'}
    ]
  },
  {
    name:"startswith()",
    cat:"search", sig:"str.startswith(prefix[, start[, end]])",
    args:[
      {name:"prefix", desc:"String or tuple of strings to check against."},
      {name:"start", desc:"(optional) Index where the check begins."},
      {name:"end", desc:"(optional) Index where the check ends (exclusive)."}
    ],
    ret:"bool", complex:true,
    desc:"Returns True if the string begins with the given prefix. The most powerful feature is passing a tuple of strings — any match returns True. Optional start/end restrict where the check applies.",
    examples:[
      {label:"basic", code:'"Hello, World".startswith("Hello")', out:'→ True'},
      {label:"tuple — multiple options", code:'"README.md".startswith(("README", "CHANGELOG"))', out:'→ True'},
      {label:"with start index", code:'"Hello, welcome to my world.".startswith("wel", 7)', out:'→ True   ← check begins at index 7'}
    ],
    gotcha:"The tuple form is the Pythonic pattern — much cleaner than chaining multiple 'or' conditions.",
    notes:"<strong>endswith()</strong> does the same check from the other end of the string."
  },
  {
    name:"endswith()",
    cat:"search", sig:"str.endswith(suffix[, start[, end]])",
    args:[
      {name:"suffix", desc:"String or tuple of strings to check against."},
      {name:"start", desc:"(optional) Slice start for the check."},
      {name:"end", desc:"(optional) Slice end (exclusive) for the check."}
    ],
    ret:"bool", complex:false,
    desc:"Returns True if the string ends with the given suffix. Accepts a tuple of suffixes — any match returns True. Commonly used for file-extension checks.",
    examples:[
      {label:"single suffix", code:'"report.pdf".endswith(".pdf")', out:'→ True'},
      {label:"multi-extension check", code:'"image.PNG".endswith((".png", ".jpg", ".gif", ".PNG"))', out:'→ True'},
      {label:"check within slice", code:'"hello world".endswith("hello", 0, 5)', out:'→ True'}
    ],
    notes:"<strong>startswith()</strong> checks the beginning of the string."
  },
  {
    name:"replace()",
    cat:"search", sig:"str.replace(old, new[, count])",
    args:[
      {name:"old", desc:"Substring to be replaced."},
      {name:"new", desc:"Replacement substring (can be empty string to delete)."},
      {name:"count", desc:"(optional) Maximum number of replacements. Defaults to all occurrences."}
    ],
    ret:"str", complex:false,
    desc:"Returns a copy with occurrences of old replaced by new. With the count argument, only the first count occurrences are replaced. Set new to '' to delete characters.",
    examples:[
      {label:"basic", code:'"python learner".replace("learner", "developer")', out:'→ "python developer"'},
      {label:"limit replacements", code:'"aabbaa".replace("a", "x", 2)', out:'→ "xxbbaa"'},
      {label:"delete by replacing with empty", code:'"Hello, World!".replace(",", "")', out:'→ "Hello World!"'}
    ]
  },
  {
    name:"translate() + maketrans()",
    cat:"search", sig:"str.translate(table)  |  str.maketrans(x[, y[, z]])",
    args:[
      {name:"x", desc:"Either a dict (ordinal→char/None), or a string of characters to map from."},
      {name:"y", desc:"(optional) String of replacement characters — must be same length as x."},
      {name:"z", desc:"(optional) String of characters to delete."}

    cat:"split", sig:"reversed(string)  →  use with join()",
    args:[],
    ret:"iterator", complex:true,
    desc:"Built-in that returns a reversed iterator over the string's characters — not a string. Wrap with ''.join() to get a reversed string back. Alternatively use slice notation s[::-1], which is more idiomatic.",
    examples:[
      {label:"with join", code:"''.join(reversed('Python'))", out:'→ "nohtyP"'},
      {label:"reversed() alone", code:"reversed('Python')", out:'→ <reversed object>   ← not a string!'},
      {label:"slicing alternative", code:'"Python"[::-1]', out:'→ "nohtyP"   ← simpler and more idiomatic'}
    ],
    gotcha:"reversed() returns an iterator — wrap with ''.join() to get a string, or use [::-1]."
  },
  {
    name:"sorted()",
    cat:"split", sig:"sorted(string, reverse=False)",
    args:[
      {name:"reverse", desc:"If True, sort in descending order. Defaults to False (ascending)."}
    ],
    ret:"list[str]", complex:false,
    desc:"Built-in that sorts the characters of a string alphabetically, returning a list of single characters. Uppercase letters precede lowercase in default ASCII ordering. Combine with join() to produce a sorted string.",
    examples:[
      {label:"basic", code:"sorted('Python')", out:"→ ['P', 'h', 'n', 'o', 't', 'y']"},
      {label:"back to string", code:"''.join(sorted('Python'))", out:'→ "Phnoty"'},
      {label:"descending", code:"''.join(sorted('python', reverse=True))", out:'→ "ytonhp"'}
    ]
  },
  {
    name:"max() / min()",
    cat:"search", sig:"max(string)  |  min(string)",
    args:[],
    ret:"str (single character)", complex:false,
    desc:"Built-in functions that return the character with the highest (max) or lowest (min) Unicode code point in the string. Effectively the alphabetically last or first character, with uppercase coming before lowercase.",
    examples:[
      {label:"max char", code:"max('Python')", out:'→ "y"   ← highest Unicode value'},
      {label:"min char", code:"min('Python')", out:'→ "P"   ← uppercase < lowercase in Unicode'},
      {label:"on a word", code:"max('banana')", out:'→ "n"'}
    ],
    notes:"These use Unicode ordinal values, not alphabetical order — <strong>sorted()</strong> gives a clearer view of the full ordering."
  }
];

/* ── State ── */
let filter = 'all';

/* ── Filter pill logic ── */
function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

/* ── Filter logic ── */
function getFiltered() {
  return METHODS.filter(m => {
    if (filter === 'complex' && !m.complex) return false;
    if (filter !== 'all' && filter !== 'complex' && m.cat !== filter) return false;
    return true;
  });
}

/* ── Toggle card ── */
function toggleCard(id) {
  document.getElementById('c' + id).classList.toggle('open');
}

/* ── Render ── */
const CAT_LABELS = {
  case:   'Case conversion',
  search: 'Search & built-ins',
  split:  'Split, join & partition',
  fmt:    'Formatting',
  check:  'Check & validate',
  clean:  'Cleaning & trimming',
  encode: 'Encoding'
};
const CAT_NAMES = {
  case:'Case', search:'Search', split:'Split/Join',
  fmt:'Format', check:'Check', clean:'Clean', encode:'Encode'
};

function renderArgs(args) {
  if (!args || !args.length) return '';
  return `<dl class="sig-args">` +
    args.map(a => `<dt>${a.name}</dt><dd>${a.desc}</dd>`).join('<br>') +
    `</dl>`;
}

function render() {
  const filtered = getFiltered();
  document.getElementById('results-count').textContent =
    filtered.length + ' method' + (filtered.length !== 1 ? 's' : '');
  document.getElementById('total-count').textContent = METHODS.length;

  if (!filtered.length) {
    document.getElementById('list').innerHTML =
      `<div class="empty">No methods in this category.</div>`;
    return;
  }

  let html = '';
  let lastCat = null;
  const showSections = filter === 'all';

  filtered.forEach((m, i) => {
    if (showSections && m.cat !== lastCat) {
      html += `<div class="sec-label"><span class="sec-dot"></span>${CAT_LABELS[m.cat] || m.cat}</div>`;
      lastCat = m.cat;
    }

    html += `
<div class="card" id="c${i}">
  <div class="card-head" onclick="toggleCard(${i})">
    <span class="method-name">${m.name}</span>
    ${m.complex ? '<span class="badge b-complex">★ complex</span>' : ''}
    <span class="badge b-cat">${CAT_NAMES[m.cat] || m.cat}</span>
    <span class="ret-badge">→ ${m.ret}</span>
  </div>
  <div class="card-sig">
    <div class="sig-box">
      <code>${m.sig}</code>
      ${renderArgs(m.args)}
    </div>
  </div>
  <div class="card-body">
    <p class="desc">${m.desc}</p>
    <div class="examples">
      ${m.examples.map(ex => `
      <div class="ex">
        <div class="ex-label">${ex.label}</div>
        <div class="ex-code">${ex.code}</div>
        ${ex.out ? `<div class="ex-out">${ex.out}</div>` : ''}
        ${ex.out2 ? `<div class="ex-out">${ex.out2}</div>` : ''}
      </div>`).join('')}
    </div>
    ${m.gotcha ? `<div class="gotcha">⚠ ${m.gotcha}</div>` : ''}
    ${m.notes ? `<div class="notes">📝 ${m.notes}</div>` : ''}
  </div>
</div>`;
  });

  document.getElementById('list').innerHTML = html;
}

render();
</script>
</body>
</html>
